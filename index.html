<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Elo Dinâmico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(2px);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-2xl mx-auto">
        <!-- Cabeçalho -->
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-800">Ranking Elo</h1>
            <p class="text-slate-500">Decisões instantâneas e engajamento 50/50</p>
        </header>

        <!-- Área de Input -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-6">
            <div class="flex gap-2">
                <input type="text" id="itemInput" placeholder="Digite o nome do item e aperte Enter..." 
                    class="flex-1 px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all">
                <button onclick="addItem()" 
                    class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2 rounded-lg transition-colors">
                    Adicionar
                </button>
            </div>
            <p id="limitWarning" class="text-xs text-slate-400 mt-2 text-center hidden">
                Nota: Ao atingir 20 itens, apenas o Top 10 será mantido.
            </p>
        </div>

        <!-- Ação de Seleção Imprevisível (50/50) -->
        <div id="topActionContainer" class="hidden mb-6">
            <button onclick="pickAndRemoveHybrid()" 
                class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl shadow-md flex flex-col items-center justify-center gap-1 transition-all transform active:scale-95 group">
                <div class="flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M5 2a1 1 0 011 1v1h1a1 1 0 010 2H6v1a1 1 0 01-2 0V6H3a1 1 0 010-2h1V3a1 1 0 011-1zm0 10a1 1 0 011 1v1h1a1 1 0 110 2H6v1a1 1 0 11-2 0v-1H3a1 1 0 110-2h1v-1a1 1 0 011-1zM12 2a1 1 0 01.967.744L14.146 7.2 17.5 9.134a1 1 0 010 1.732l-3.354 1.935-1.18 4.455a1 1 0 01-1.933 0L9.854 12.8 6.5 10.866a1 1 0 010-1.732l3.354-1.935 1.18-4.455A1 1 0 0112 2z" clip-rule="evenodd" />
                    </svg>
                    <span>Obter Próximo Destaque</span>
                </div>
                <span class="text-[10px] uppercase tracking-widest opacity-80 group-hover:opacity-100 italic">Algoritmo 50/50</span>
            </button>
        </div>

        <!-- Lista de Ranking -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="bg-slate-50 px-6 py-3 border-b border-slate-200 flex justify-between text-sm font-semibold text-slate-600">
                <span>ITEM</span>
                <span>ELO RATING</span>
            </div>
            <ul id="rankingList" class="divide-y divide-slate-100"></ul>
            <div id="emptyState" class="p-12 text-center text-slate-400">
                Nenhum item adicionado ainda.
            </div>
        </div>

        <!-- Botão para limpar tudo -->
        <div class="mt-8 text-center">
            <button onclick="clearAllData()" class="text-xs text-red-400 hover:text-red-600 underline transition-colors">
                Limpar todos os dados salvos
            </button>
        </div>
    </div>

    <!-- Modal de Duelo -->
    <div id="duelModal" class="fixed inset-0 modal-overlay z-50 flex items-center justify-center hidden">
        <div class="bg-white w-full max-w-md mx-4 rounded-3xl shadow-2xl overflow-hidden">
            <div class="p-6 border-b border-slate-100">
                <h2 class="text-xl font-bold text-slate-800">Duelos de Equilíbrio</h2>
                <p class="text-sm text-slate-500">Escolha o vencedor para fechar</p>
            </div>
            <div id="duelContainer" class="p-6 space-y-6">
                <!-- Duelos injetados via JS -->
            </div>
            <div class="p-4 bg-slate-50 flex justify-end">
                <button onclick="closeModal()" class="text-slate-500 hover:text-slate-700 font-medium px-4 py-2">Pular</button>
            </div>
        </div>
    </div>

    <!-- Toast de Notificação -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-lg opacity-0 transition-opacity pointer-events-none z-[60] text-center min-w-[200px]">
        Copiado!
    </div>

    <script>
        let items = JSON.parse(localStorage.getItem('elo_ranking_data')) || [];
        const K = 32;

        window.onload = () => {
            renderRanking();
            updateLimitWarning();

            // Adiciona suporte ao Enter
            document.getElementById('itemInput').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    addItem();
                }
            });
        };

        function saveToLocalStorage() {
            localStorage.setItem('elo_ranking_data', JSON.stringify(items));
        }

        function addItem() {
            const input = document.getElementById('itemInput');
            const text = input.value.trim();
            if (!text) return;

            let initialElo = 1500;
            if (items.length > 0) {
                const sum = items.reduce((acc, curr) => acc + curr.elo, 0);
                initialElo = Math.round(sum / items.length);
            }

            const newItem = { id: Date.now() + Math.random(), text: text, elo: initialElo };
            items.push(newItem);
            input.value = '';

            checkAndPruneList();
            saveToLocalStorage();
            renderRanking();
            setupDuels(newItem);
            updateLimitWarning();
        }

        function checkAndPruneList() {
            if (items.length >= 20) {
                items.sort((a, b) => b.elo - a.elo);
                items = items.slice(0, 10);
                showToast("Lista reduzida para o Top 10.");
                saveToLocalStorage();
            }
        }

        function updateLimitWarning() {
            const warning = document.getElementById('limitWarning');
            if (items.length >= 15) {
                warning.classList.remove('hidden');
                warning.innerText = `Itens: ${items.length}/20.`;
            } else {
                warning.classList.add('hidden');
            }
        }

        function calculateNewElo(winner, loser) {
            const expectedWinner = 1 / (1 + Math.pow(10, (loser.elo - winner.elo) / 400));
            const expectedLoser = 1 / (1 + Math.pow(10, (winner.elo - loser.elo) / 400));
            winner.elo = Math.round(winner.elo + K * (1 - expectedWinner));
            loser.elo = Math.round(loser.elo + K * (0 - expectedLoser));
            saveToLocalStorage();
        }

        function setupDuels(newlyAddedItem) {
            const itemExists = items.find(i => i.id === newlyAddedItem.id);
            if (items.length < 2 || !itemExists) return;

            const modal = document.getElementById('duelModal');
            const container = document.getElementById('duelContainer');
            container.innerHTML = '';

            const duelsCount = Math.min(2, items.length - 1);
            const opponents = [...items].filter(i => i.id !== newlyAddedItem.id);
            opponents.sort(() => Math.random() - 0.5);

            for (let i = 0; i < duelsCount; i++) {
                const opponent = opponents[i];
                const duelDiv = document.createElement('div');
                duelDiv.className = 'duel-row flex flex-col gap-2';
                duelDiv.dataset.resolved = "false"; // Atributo para controle de fechamento
                
                duelDiv.innerHTML = `
                    <div class="flex items-center justify-between gap-2">
                        <button onclick="handleWinner('${newlyAddedItem.id}', '${opponent.id}', this)" 
                            class="flex-1 bg-white border-2 border-slate-100 p-3 rounded-xl font-semibold text-slate-700 active:bg-blue-600 active:text-white transition-colors duration-75">
                            ${newlyAddedItem.text}
                        </button>
                        <span class="text-[10px] font-bold text-slate-300">VS</span>
                        <button onclick="handleWinner('${opponent.id}', '${newlyAddedItem.id}', this)" 
                            class="flex-1 bg-white border-2 border-slate-100 p-3 rounded-xl font-semibold text-slate-700 active:bg-blue-600 active:text-white transition-colors duration-75">
                            ${opponent.text}
                        </button>
                    </div>
                `;
                container.appendChild(duelDiv);
            }
            modal.classList.remove('hidden');
        }

        function handleWinner(winnerId, loserId, buttonElement) {
            const winner = items.find(i => i.id == winnerId);
            const loser = items.find(i => i.id == loserId);

            if (winner && loser) {
                calculateNewElo(winner, loser);
            }
            
            // Marca o duelo como resolvido via atributo data
            const row = buttonElement.closest('.duel-row');
            row.dataset.resolved = "true";
            row.style.opacity = '0.2';
            row.style.pointerEvents = 'none';

            // Verifica se todos os duelos foram resolvidos
            const allRows = document.querySelectorAll('.duel-row');
            const allResolved = Array.from(allRows).every(r => r.dataset.resolved === "true");
            
            if (allResolved) {
                closeModal(); 
            }

            renderRanking();
        }

        function closeModal() {
            document.getElementById('duelModal').classList.add('hidden');
        }

        function renderRanking() {
            const list = document.getElementById('rankingList');
            const emptyState = document.getElementById('emptyState');
            const topAction = document.getElementById('topActionContainer');
            
            items.sort((a, b) => b.elo - a.elo);
            list.innerHTML = '';
            
            if (items.length === 0) {
                emptyState.classList.remove('hidden');
                topAction.classList.add('hidden');
            } else {
                emptyState.classList.add('hidden');
                topAction.classList.remove('hidden');
                items.forEach((item, index) => {
                    const li = document.createElement('li');
                    li.className = `flex justify-between items-center px-6 py-4 ${index === 0 ? 'bg-amber-50/30' : ''}`;
                    li.innerHTML = `
                        <div class="flex items-center gap-4">
                            <span class="font-bold text-lg w-6 ${index === 0 ? 'text-amber-500' : 'text-slate-300'}">#${index + 1}</span>
                            <span class="font-medium text-slate-700">${item.text}</span>
                        </div>
                        <span class="font-mono font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-lg text-xs">${item.elo}</span>
                    `;
                    list.appendChild(li);
                });
            }
        }

        function pickAndRemoveHybrid() {
            if (items.length === 0) return;
            items.sort((a, b) => b.elo - a.elo);
            let selectedIndex = 0;
            if (items.length > 1 && Math.random() >= 0.5) {
                selectedIndex = Math.floor(Math.random() * (items.length - 1)) + 1;
            }

            const selectedItem = items[selectedIndex];
            
            // Copiar
            const tempInput = document.createElement('input');
            tempInput.value = selectedItem.text;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand('copy');
            document.body.removeChild(tempInput);

            // Deletar
            items = items.filter(i => i.id !== selectedItem.id);
            saveToLocalStorage();
            
            showToast(selectedIndex === 0 ? "Top 1 copiado!" : "Item surpresa copiado!");
            renderRanking();
            updateLimitWarning();
        }

        function clearAllData() {
            if (confirm("Apagar tudo?")) {
                items = [];
                localStorage.removeItem('elo_ranking_data');
                renderRanking();
                updateLimitWarning();
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2000);
        }
    </script>
</body>
</html>
