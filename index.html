<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranker</title>
  <!-- Tailwind CSS para estilização rápida e utilitária -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            darkbg: '#0a0a0a',
            darkcard: '#121212',
            darkborder: '#222222',
            darkaccent: '#333333'
          }
        }
      }
    }
  </script>
  <style>
    /* Estilos e transições customizadas */
    body {
      background-color: #0a0a0a;
      color: #e5e5e5;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="flex flex-col min-h-screen justify-between items-center p-4 md:p-8 antialiased selection:bg-neutral-800 selection:text-neutral-200">

  <!-- Container Principal -->
  <main class="w-full max-w-md mx-auto flex flex-col flex-grow justify-center py-12">
    
    <!-- Header -->
    <header class="mb-8 text-center">
      <h1 class="text-xs uppercase tracking-[0.3em] text-neutral-500 font-semibold">Ranking</h1>
    </header>

    <!-- Form de Entrada de Item -->
    <section class="mb-8">
      <form id="add-form" class="flex gap-2">
        <input 
          type="text" 
          id="item-input" 
          maxlength="40"
          placeholder="Novo item..." 
          autocomplete="off"
          class="flex-1 bg-darkcard border border-darkborder rounded-lg px-4 py-2.5 text-sm text-neutral-200 placeholder-neutral-600 focus:outline-none focus:border-neutral-500 transition-colors"
        />
        <button 
          type="submit" 
          class="bg-neutral-200 hover:bg-white text-neutral-950 font-medium text-xs uppercase tracking-wider px-5 py-2.5 rounded-lg transition-all active:scale-[0.98]"
        >
          Inserir
        </button>
      </form>
    </section>

    <!-- Lista de Rankings -->
    <section class="flex-grow">
      <ul id="ranking-list" class="space-y-2">
        <!-- Inserido dinamicamente via JS -->
      </ul>
      
      <!-- Estado Vazio -->
      <div id="empty-state" class="hidden text-center py-12">
        <p class="text-sm text-neutral-600 tracking-wide font-light">A lista está vazia</p>
      </div>
    </section>

    <!-- Footer Controls -->
    <footer class="mt-8 text-center">
      <button 
        id="clear-btn" 
        class="text-[10px] uppercase tracking-widest text-neutral-600 hover:text-neutral-400 transition-colors hidden"
      >
        Limpar Tudo
      </button>
    </footer>

  </main>

  <!-- Modal / Popup de Comparação Binária -->
  <div 
    id="comparison-modal" 
    class="fixed inset-0 bg-black/90 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden opacity-0 transition-opacity duration-300"
  >
    <div class="w-full max-w-xl flex flex-col items-center">
      <p class="text-[10px] uppercase tracking-[0.4em] text-neutral-500 mb-8 font-semibold">Selecione a melhor opção</p>
      
      <div class="grid grid-cols-2 gap-4 w-full">
        <!-- Opção A (Novo Item) -->
        <button 
          id="option-left"
          class="aspect-square bg-darkcard border border-darkborder hover:border-neutral-500 rounded-xl p-6 flex flex-col items-center justify-center text-center transition-all duration-200 hover:scale-[1.02] active:scale-[0.98] group"
        >
          <span class="text-neutral-400 group-hover:text-neutral-200 text-base md:text-lg font-light transition-colors break-words w-full" id="left-text"></span>
        </button>

        <!-- Opção B (Item Existente no Meio/Fim) -->
        <button 
          id="option-right"
          class="aspect-square bg-darkcard border border-darkborder hover:border-neutral-500 rounded-xl p-6 flex flex-col items-center justify-center text-center transition-all duration-200 hover:scale-[1.02] active:scale-[0.98] group"
        >
          <span class="text-neutral-400 group-hover:text-neutral-200 text-base md:text-lg font-light transition-colors break-words w-full" id="right-text"></span>
        </button>
      </div>
    </div>
  </div>

  <!-- Toast / Notificação Rápida de Eliminação -->
  <div 
    id="eliminated-toast" 
    class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-neutral-900 border border-neutral-800 text-neutral-400 text-xs tracking-wider px-4 py-2.5 rounded-full shadow-2xl pointer-events-none transform translate-y-4 opacity-0 transition-all duration-300 z-50"
  >
    Item eliminado instantaneamente.
  </div>

  <!-- Lógica da Aplicação -->
  <script>
    // --- ESTADO DO SISTEMA ---
    let items = []; // Ranking atual (máx 7 itens)
    
    // Estado do algoritmo de inserção ativa
    let insertionState = {
      active: false,
      newItem: '',
      low: 0,
      high: 0,
      mid: 0,
      isComparingLast: false
    };

    // --- ELEMENTOS DOM ---
    const addForm = document.getElementById('add-form');
    const itemInput = document.getElementById('item-input');
    const rankingList = document.getElementById('ranking-list');
    const emptyState = document.getElementById('empty-state');
    const clearBtn = document.getElementById('clear-btn');
    
    const comparisonModal = document.getElementById('comparison-modal');
    const optionLeft = document.getElementById('option-left');
    const optionRight = document.getElementById('option-right');
    const leftText = document.getElementById('left-text');
    const rightText = document.getElementById('right-text');
    
    const eliminatedToast = document.getElementById('eliminated-toast');

    // --- CARREGAR ESTADO INICIAL ---
    function init() {
      const stored = localStorage.getItem('ranked_items');
      if (stored) {
        try {
          items = JSON.parse(stored);
        } catch (e) {
          items = [];
        }
      }
      render();
    }

    // --- SALVAR ESTADO ---
    function saveState() {
      localStorage.setItem('ranked_items', JSON.stringify(items));
    }

    // --- RENDERIZAR LISTA ---
    function render() {
      rankingList.innerHTML = '';
      
      if (items.length === 0) {
        emptyState.classList.remove('hidden');
        clearBtn.classList.add('hidden');
      } else {
        emptyState.classList.add('hidden');
        clearBtn.classList.remove('hidden');
        
        items.forEach((item, index) => {
          const li = document.createElement('li');
          li.className = 'flex items-center justify-between bg-darkcard border border-darkborder hover:border-neutral-800 px-4 py-3.5 rounded-lg transition-all group';
          
          li.innerHTML = `
            <div class="flex items-center gap-4">
              <span class="text-xs font-mono text-neutral-600 w-4">${index + 1}</span>
              <span class="text-sm font-light text-neutral-300">${escapeHTML(item)}</span>
            </div>
            <button 
              onclick="removeItem(${index})" 
              class="text-neutral-600 hover:text-neutral-400 opacity-0 group-hover:opacity-100 focus:opacity-100 transition-opacity text-xs p-1"
              aria-label="Remover item"
            >
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
          `;
          rankingList.appendChild(li);
        });
      }
    }

    // --- HELPER PARA EVITAR XSS ---
    function escapeHTML(str) {
      return str.replace(/[&<>'"]/g, 
        tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
      );
    }

    // --- EVENTOS E ENTRADA ---
    addForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const val = itemInput.value.trim();
      if (!val) return;
      
      itemInput.value = '';
      startInsertion(val);
    });

    clearBtn.addEventListener('click', () => {
      items = [];
      saveState();
      render();
    });

    function removeItem(index) {
      items.splice(index, 1);
      saveState();
      render();
    }

    // --- FLUXO DE INSERÇÃO BINÁRIA PERSONALIZADA ---
    function startInsertion(name) {
      if (items.length === 0) {
        items.push(name);
        saveState();
        render();
        return;
      }

      // Configura o estado inicial do algoritmo
      insertionState = {
        active: true,
        newItem: name,
        low: 0,
        high: items.length - 1,
        mid: 0,
        isComparingLast: true // Começa comparando com o último item
      };

      showComparison(name, items[items.length - 1]);
    }

    function showComparison(leftVal, rightVal) {
      leftText.textContent = leftVal;
      rightText.textContent = rightVal;
      
      comparisonModal.classList.remove('hidden');
      setTimeout(() => {
        comparisonModal.classList.remove('opacity-0');
      }, 10);
    }

    function hideComparison() {
      comparisonModal.classList.add('opacity-0');
      setTimeout(() => {
        comparisonModal.classList.add('hidden');
      }, 300);
    }

    // Escolha entre as opções do Modal
    optionLeft.addEventListener('click', () => {
      // Novo Item ganhou
      handleChoice(true);
    });

    optionRight.addEventListener('click', () => {
      // Novo Item perdeu (item existente ganhou)
      handleChoice(false);
    });

    function handleChoice(newWins) {
      if (!insertionState.active) return;

      const n = items.length;

      if (insertionState.isComparingLast) {
        // Primeira comparação: com o último item
        if (!newWins) {
          // Perdeu do último item -> Eliminado na hora
          triggerElimination();
          finishInsertionFlow(false);
        } else {
          // Venceu o último item -> Vai para comparação binária tradicional
          insertionState.isComparingLast = false;
          insertionState.high = n - 2; // Já sabemos que bateu o último (n-1)
          
          if (insertionState.low > insertionState.high) {
            // Caso especial: se havia apenas 1 item na lista original
            // e o novo venceu, ele assume o topo (index 0)
            finishInsertionFlow(true, 0);
          } else {
            nextBinaryStep();
          }
        }
      } else {
        // Fluxo de inserção binária tradicional
        if (newWins) {
          // Novo item é melhor -> busca na metade superior do ranking (índices menores)
          insertionState.high = insertionState.mid - 1;
        } else {
          // Novo item é pior -> busca na metade inferior do ranking (índices maiores)
          insertionState.low = insertionState.mid + 1;
        }

        if (insertionState.low > insertionState.high) {
          // Slot encontrado! Encaixa em 'low'
          finishInsertionFlow(true, insertionState.low);
        } else {
          nextBinaryStep();
        }
      }
    }

    function nextBinaryStep() {
      const state = insertionState;
      state.mid = Math.floor((state.low + state.high) / 2);
      showComparison(state.newItem, items[state.mid]);
    }

    function finishInsertionFlow(inserted, index = null) {
      hideComparison();
      
      if (inserted && index !== null) {
        items.splice(index, 0, insertionState.newItem);
        
        // Se após a inserção tiver 8 itens, remove o último permanentemente
        if (items.length > 7) {
          items.pop();
        }
        
        saveState();
        render();
      }
      
      // Reseta estado
      insertionState = {
        active: false,
        newItem: '',
        low: 0,
        high: 0,
        mid: 0,
        isComparingLast: false
      };
    }

    // Feedback de eliminação imediata
    function triggerElimination() {
      eliminatedToast.classList.remove('translate-y-4', 'opacity-0');
      eliminatedToast.classList.add('translate-y-0', 'opacity-100');
      
      setTimeout(() => {
        eliminatedToast.classList.remove('translate-y-0', 'opacity-100');
        eliminatedToast.classList.add('translate-y-4', 'opacity-0');
      }, 2500);
    }

    // Inicializa a aplicação ao carregar
    window.onload = init;
  </script>
</body>
</html>
