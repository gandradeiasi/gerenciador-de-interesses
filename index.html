<!DOCTYPE html>
<html lang="pt-PT" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranker</title>
  <!-- Tailwind CSS para estilização rápida e utilitária -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            darkbg: '#0a0a0a',
            darkcard: '#121212',
            darkborder: '#222222',
            darkaccent: '#333333'
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #0a0a0a;
      color: #e5e5e5;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="flex flex-col min-h-screen justify-between items-center p-4 md:p-8 antialiased selection:bg-neutral-800 selection:text-neutral-200">

  <!-- Contentor Principal -->
  <main class="w-full max-w-md mx-auto flex flex-col flex-grow justify-center py-12">
    
    <!-- Cabeçalho -->
    <header class="mb-6 text-center">
      <h1 class="text-xs uppercase tracking-[0.3em] text-neutral-500 font-semibold">Ranking</h1>
    </header>

    <!-- Navegação / CRUD de Separadores Dinâmicos -->
    <nav class="mb-8 flex flex-col items-center border-b border-neutral-900 pb-3" aria-label="Temas de ranking">
      <div class="flex items-center gap-3 max-w-full overflow-x-auto scrollbar-hide py-1">
        <!-- Contentor onde os separadores do utilizador serão renderizados -->
        <div id="tabs-container" class="flex items-center gap-4"></div>
        
        <!-- Botões de Ação para Criar Separador -->
        <div class="flex items-center gap-2">
          <button 
            id="add-tab-btn" 
            onclick="showNewTabInput()"
            class="text-neutral-500 hover:text-neutral-300 text-sm font-light px-2 py-0.5 transition-colors"
            title="Nova Lista"
          >
            +
          </button>
          <input 
            type="text" 
            id="new-tab-input" 
            placeholder="Nova lista..."
            class="hidden bg-darkcard border border-darkborder rounded px-2 py-1 text-xs text-neutral-200 placeholder-neutral-700 w-24 focus:outline-none focus:border-neutral-600"
          />
        </div>
      </div>
    </nav>

    <!-- Formulário de Entrada de Item -->
    <section class="mb-8">
      <form id="add-form" class="flex gap-2">
        <input 
          type="text" 
          id="item-input" 
          placeholder="Novo item..." 
          autocomplete="off"
          class="flex-1 bg-darkcard border border-darkborder rounded-lg px-4 py-2.5 text-sm text-neutral-200 placeholder-neutral-600 focus:outline-none focus:border-neutral-500 transition-colors"
        />
        <button 
          type="submit" 
          class="bg-neutral-200 hover:bg-white text-neutral-950 font-medium text-xs uppercase tracking-wider px-5 py-2.5 rounded-lg transition-all active:scale-[0.98]"
        >
          Inserir
        </button>
      </form>
    </section>

    <!-- Lista de Rankings -->
    <section class="flex-grow">
      <ul id="ranking-list" class="space-y-2">
        <!-- Inserido dinamicamente via JS -->
      </ul>
      
      <!-- Estado Vazio -->
      <div id="empty-state" class="hidden text-center py-12">
        <p class="text-sm text-neutral-600 tracking-wide font-light">A lista está vazia</p>
      </div>
    </section>

    <!-- Controlos de Rodapé -->
    <footer class="mt-8 text-center">
      <button 
        id="clear-btn" 
        class="text-[10px] uppercase tracking-widest text-neutral-600 hover:text-neutral-400 transition-colors hidden"
      >
        Limpar Tudo
      </button>
    </footer>

  </main>

  <!-- Modal / Popup de Comparação Binária -->
  <div 
    id="comparison-modal" 
    class="fixed inset-0 bg-black/90 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden opacity-0 transition-opacity duration-300"
  >
    <div class="w-full max-w-xl flex flex-col items-center">
      <p class="text-[10px] uppercase tracking-[0.4em] text-neutral-500 mb-8 font-semibold">Selecione a melhor opção</p>
      
      <div class="grid grid-cols-2 gap-4 w-full">
        <!-- Opção A -->
        <button 
          id="option-left"
          class="aspect-square bg-darkcard border border-darkborder hover:border-neutral-500 rounded-xl p-6 flex flex-col items-center justify-center text-center transition-all duration-200 hover:scale-[1.02] active:scale-[0.98] group"
        >
          <span class="text-neutral-400 group-hover:text-neutral-200 text-base md:text-lg font-light transition-colors break-words w-full" id="left-text"></span>
        </button>

        <!-- Opção B -->
        <button 
          id="option-right"
          class="aspect-square bg-darkcard border border-darkborder hover:border-neutral-500 rounded-xl p-6 flex flex-col items-center justify-center text-center transition-all duration-200 hover:scale-[1.02] active:scale-[0.98] group"
        >
          <span class="text-neutral-400 group-hover:text-neutral-200 text-base md:text-lg font-light transition-colors break-words w-full" id="right-text"></span>
        </button>
      </div>
    </div>
  </div>

  <!-- Toast / Notificação Rápida de Eliminação -->
  <div 
    id="eliminated-toast" 
    class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-neutral-900 border border-neutral-800 text-neutral-400 text-xs tracking-wider px-4 py-2.5 rounded-full shadow-2xl pointer-events-none transform translate-y-4 opacity-0 transition-all duration-300 z-50"
  >
    Item eliminado instantaneamente.
  </div>

  <script>
    // Estrutura dinâmica do estado
    let appState = {
      activeTabId: '',
      tabs: [], // Array de objetos { id: 'string', name: 'string' }
      rankings: {} // Objeto indexado por id do separador contendo arrays de strings
    };
    
    // Estado do algoritmo de inserção activa
    let insertionState = {
      active: false,
      newItem: '',
      low: 0,
      high: 0,
      mid: 0,
      isComparingLast: false
    };

    // --- ELEMENTOS DOM ---
    const addForm = document.getElementById('add-form');
    const itemInput = document.getElementById('item-input');
    const rankingList = document.getElementById('ranking-list');
    const emptyState = document.getElementById('empty-state');
    const clearBtn = document.getElementById('clear-btn');
    
    const tabsContainer = document.getElementById('tabs-container');
    const addTabBtn = document.getElementById('add-tab-btn');
    const newTabInput = document.getElementById('new-tab-input');

    const comparisonModal = document.getElementById('comparison-modal');
    const optionLeft = document.getElementById('option-left');
    const optionRight = document.getElementById('option-right');
    const leftText = document.getElementById('left-text');
    const rightText = document.getElementById('right-text');
    
    const eliminatedToast = document.getElementById('eliminated-toast');

    // --- Inicialização e Carregamento do LocalStorage ---
    function init() {
      const stored = localStorage.getItem('ranked_state_tabs_crud');
      if (stored) {
        try {
          const parsed = JSON.parse(stored);
          if (parsed.tabs && parsed.tabs.length > 0) {
            appState = parsed;
          } else {
            createDefaultTab();
          }
        } catch (e) {
          createDefaultTab();
        }
      } else {
        createDefaultTab();
      }
      render();
    }

    function createDefaultTab() {
      const defaultId = 'tab_' + Date.now();
      appState.tabs = [{ id: defaultId, name: 'Principal' }];
      appState.activeTabId = defaultId;
      appState.rankings = { [defaultId]: [] };
      saveState();
    }

    function saveState() {
      localStorage.setItem('ranked_state_tabs_crud', JSON.stringify(appState));
    }

    // --- Renderização dos Separadores (Listas) ---
    function renderTabs() {
      tabsContainer.innerHTML = '';
      
      appState.tabs.forEach(tab => {
        const isActive = tab.id === appState.activeTabId;
        const tabEl = document.createElement('div');
        tabEl.className = `flex items-center gap-1.5 group relative py-1 transition-colors`;
        
        // Etiqueta/Nome do Separador
        const labelBtn = document.createElement('button');
        labelBtn.type = 'button';
        labelBtn.className = isActive 
          ? "text-xs uppercase tracking-widest font-semibold text-neutral-100 after:content-[''] after:absolute after:bottom-0 after:left-1/2 after:-translate-x-1/2 after:w-1 after:h-1 after:bg-neutral-100 after:rounded-full"
          : "text-xs uppercase tracking-widest font-medium text-neutral-500 hover:text-neutral-300";
        labelBtn.textContent = tab.name;
        
        // Se já estiver activo, clica para editar. Caso contrário, clica para alternar.
        labelBtn.onclick = (e) => {
          e.preventDefault();
          if (isActive) {
            editTabInline(tab.id, labelBtn);
          } else {
            switchTab(tab.id);
          }
        };

        tabEl.appendChild(labelBtn);

        // Ícone de eliminação para separadores activos (apenas se houver mais de um separador no total)
        if (isActive && appState.tabs.length > 1) {
          const deleteBtn = document.createElement('button');
          deleteBtn.type = 'button';
          deleteBtn.className = "text-neutral-600 hover:text-neutral-400 text-[10px] ml-1 transition-opacity opacity-0 group-hover:opacity-100";
          deleteBtn.innerHTML = `
            <svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
          `;
          deleteBtn.onclick = (e) => {
            e.stopPropagation();
            deleteTab(tab.id);
          };
          tabEl.appendChild(deleteBtn);
        }

        tabsContainer.appendChild(tabEl);
      });
    }

    function switchTab(tabId) {
      if (insertionState.active) return; // Bloqueia a troca de separador durante a inserção
      appState.activeTabId = tabId;
      saveState();
      render();
    }

    function showNewTabInput() {
      addTabBtn.classList.add('hidden');
      newTabInput.classList.remove('hidden');
      newTabInput.focus();
    }

    // Processamento centralizado para gravar o novo separador
    function saveNewTab() {
      if (newTabInput.classList.contains('hidden')) return;
      
      const val = newTabInput.value.trim();
      if (val) {
        const newId = 'tab_' + Date.now();
        appState.tabs.push({ id: newId, name: val });
        appState.rankings[newId] = [];
        appState.activeTabId = newId;
        
        saveState();
      }
      resetTabInput();
      render();
    }

    // Processamento da Introdução do Novo Separador
    newTabInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        saveNewTab();
      } else if (e.key === 'Escape') {
        newTabInput.value = ''; // Limpa para evitar gravar no evento de blur
        resetTabInput();
      }
    });

    newTabInput.addEventListener('blur', () => {
      saveNewTab();
    });

    function resetTabInput() {
      newTabInput.value = '';
      newTabInput.classList.add('hidden');
      addTabBtn.classList.remove('hidden');
    }

    // Edição Direta Inline do Separador
    function editTabInline(tabId, element) {
      if (insertionState.active) return;
      
      const currentName = element.textContent;
      const input = document.createElement('input');
      input.value = currentName;
      input.className = 'bg-transparent text-center border-b border-neutral-500 focus:outline-none w-20 text-xs font-semibold text-neutral-100 uppercase tracking-widest';
      element.replaceWith(input);
      input.focus();
      input.select();
      
      let isSaved = false;
      
      const save = () => {
        if (isSaved) return;
        isSaved = true;
        
        const val = input.value.trim();
        if (val && val !== currentName) {
          const tab = appState.tabs.find(t => t.id === tabId);
          if (tab) tab.name = val;
          saveState();
        }
        render();
      };
      
      input.onblur = save;
      input.onkeydown = (e) => {
        if (e.key === 'Enter') {
          save();
        }
        if (e.key === 'Escape') {
          isSaved = true;
          render();
        }
      };
    }

    function deleteTab(tabId) {
      if (insertionState.active) return;
      if (appState.tabs.length <= 1) return; // Impede a remoção do último separador restante

      const index = appState.tabs.findIndex(t => t.id === tabId);
      if (index !== -1) {
        appState.tabs.splice(index, 1);
        delete appState.rankings[tabId];
        
        // Se eliminou o separador activo, migra para o primeiro separador disponível
        if (appState.activeTabId === tabId) {
          appState.activeTabId = appState.tabs[0].id;
        }
        saveState();
        render();
      }
    }

    // --- Renderização dos Itens do Separador Activo ---
    function render() {
      renderTabs();
      
      rankingList.innerHTML = '';
      const currentList = appState.rankings[appState.activeTabId] || [];
      
      if (currentList.length === 0) {
        emptyState.classList.remove('hidden');
        clearBtn.classList.add('hidden');
      } else {
        emptyState.classList.add('hidden');
        clearBtn.classList.remove('hidden');
        
        currentList.forEach((item, index) => {
          const li = document.createElement('li');
          li.className = 'flex items-center justify-between bg-darkcard border border-darkborder hover:border-neutral-800 px-4 py-3.5 rounded-lg transition-all group';
          
          li.innerHTML = `
            <div class="flex items-center gap-4">
              <span class="text-xs font-mono text-neutral-600 w-4">${index + 1}</span>
              <span class="text-sm font-light text-neutral-300">${escapeHTML(item)}</span>
            </div>
            <button 
              onclick="removeItem(${index})" 
              class="text-neutral-600 hover:text-neutral-400 opacity-0 group-hover:opacity-100 focus:opacity-100 transition-opacity text-xs p-1"
              aria-label="Remover item"
            >
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
          `;
          rankingList.appendChild(li);
        });
      }
    }

    // --- AUXILIAR PARA EVITAR XSS ---
    function escapeHTML(str) {
      return str.replace(/[&<>'"]/g, 
        tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
      );
    }

    // --- EVENTOS E ENTRADA ---
    addForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const val = itemInput.value.trim();
      if (!val) return;
      
      itemInput.value = '';
      startInsertion(val);
    });

    clearBtn.addEventListener('click', () => {
      appState.rankings[appState.activeTabId] = [];
      saveState();
      render();
    });

    function removeItem(index) {
      const currentList = appState.rankings[appState.activeTabId];
      if (currentList) {
        currentList.splice(index, 1);
        saveState();
        render();
      }
    }

    // --- Algoritmo de Inserção Binária ---
    function startInsertion(name) {
      const currentList = appState.rankings[appState.activeTabId];

      if (!currentList || currentList.length === 0) {
        appState.rankings[appState.activeTabId] = [name];
        saveState();
        render();
        return;
      }

      // Configura o estado inicial do algoritmo baseado no separador activo
      insertionState = {
        active: true,
        newItem: name,
        low: 0,
        high: currentList.length - 1,
        mid: 0,
        isComparingLast: true // Primeira comparação obrigatória com o último
      };

      showComparison(name, currentList[currentList.length - 1]);
    }

    function showComparison(leftVal, rightVal) {
      leftText.textContent = leftVal;
      rightText.textContent = rightVal;
      
      comparisonModal.classList.remove('hidden');
      setTimeout(() => {
        comparisonModal.classList.remove('opacity-0');
      }, 10);
    }

    // Ocultar modal suavemente
    function hideComparison() {
      comparisonModal.classList.add('opacity-0');
      setTimeout(() => {
        comparisonModal.classList.add('hidden');
      }, 300);
    }

    // Escolha entre as opções do Modal
    optionLeft.addEventListener('click', () => {
      handleChoice(true); // Novo Item ganhou
    });

    optionRight.addEventListener('click', () => {
      handleChoice(false); // Novo Item perdeu
    });

    function handleChoice(newWins) {
      if (!insertionState.active) return;

      const currentList = appState.rankings[appState.activeTabId];
      const n = currentList.length;

      if (insertionState.isComparingLast) {
        // Primeira comparação: com o último item
        if (!newWins) {
          if (n >= 7) {
            // Perdeu do último item e a lista está no limite (7 itens) -> Eliminado no momento
            triggerElimination();
            finishInsertionFlow(false);
          } else {
            // Perdeu do último item mas há espaço -> Adiciona à última posição
            finishInsertionFlow(true, n);
          }
        } else {
          // Venceu o último item -> Prossegue com a comparação binária tradicional
          insertionState.isComparingLast = false;
          insertionState.high = n - 2; // Já bateu o último (n-1)
          
          if (insertionState.low > insertionState.high) {
            // Caso especial: se existia apenas 1 item original
            finishInsertionFlow(true, 0);
          } else {
            nextBinaryStep();
          }
        }
      } else {
        // Fluxo de pesquisa binária tradicional
        if (newWins) {
          // Novo item é melhor -> procura no segmento superior do ranking (índices menores)
          insertionState.high = insertionState.mid - 1;
        } else {
          // Novo item é pior -> procura no segmento inferior do ranking (índices maiores)
          insertionState.low = insertionState.mid + 1;
        }

        if (insertionState.low > insertionState.high) {
          // Posição final mapeada
          finishInsertionFlow(true, insertionState.low);
        } else {
          nextBinaryStep();
        }
      }
    }

    function nextBinaryStep() {
      const currentList = appState.rankings[appState.activeTabId];
      const state = insertionState;
      state.mid = Math.floor((state.low + state.high) / 2);
      showComparison(state.newItem, currentList[state.mid]);
    }

    function finishInsertionFlow(inserted, index = null) {
      hideComparison();
      
      if (inserted && index !== null) {
        const currentList = appState.rankings[appState.activeTabId];
        currentList.splice(index, 0, insertionState.newItem);
        
        // Se após a inserção ultrapassar o limite, o último (8º) é eliminado permanentemente
        if (currentList.length > 7) {
          currentList.pop();
        }
        
        saveState();
        render();
      }
      
      // Repor estado de inserção activa
      insertionState = {
        active: false,
        newItem: '',
        low: 0,
        high: 0,
        mid: 0,
        isComparingLast: false
      };
    }

    // Feedback visual para quando o item perde na comparação preliminar
    function triggerElimination() {
      eliminatedToast.classList.remove('translate-y-4', 'opacity-0');
      eliminatedToast.classList.add('translate-y-0', 'opacity-100');
      
      setTimeout(() => {
        eliminatedToast.classList.remove('translate-y-0', 'opacity-100');
        eliminatedToast.classList.add('translate-y-4', 'opacity-0');
      }, 2500);
    }

    // Inicialização ao carregar a página
    window.onload = init;
  </script>
</body>
</html>
